<div id="music-player" style="text-align:center;background:white;padding:20px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1);max-width:300px;margin:50px auto;border:2px solid #007bff;">

    <div style="font-size:0.9rem;color:#666;text-transform:uppercase;">
        Now Playing Song
    </div>

    <div style="font-weight:bold;color:#007bff;margin:10px 0;">
        🎵🎵🎵
    </div>

    <button onclick="toggleMusic()" id="music-btn"
        style="padding:10px 20px;border:none;border-radius:25px;background:#007bff;color:white;font-size:16px;cursor:pointer;">
        ▶ Bật nhạc
    </button>

    <audio id="music" loop>
        <source src="septung.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("music-btn");

function toggleMusic(){
    if(music.paused){
        music.play();
        btn.innerHTML = "⏸ Tắt nhạc";
    } else {
        music.pause();
        btn.innerHTML = "▶ Bật nhạc";
    }
}
</script>
